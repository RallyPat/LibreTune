[book]
title = "FCoreTuner 用户手册"
authors = ["FCoreTuner 贡献者"]
description = "FCoreTuner ECU 调校软件用户指南"
language = "zh-CN"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/FFGG10-29/FCoreTuner"
edit-url-template = "https://github.com/FFGG10-29/FCoreTuner/edit/main/docs/{path}"
site-url = "/FCoreTuner/"
cname = ""
input-404 = "404.md"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical-structure = true

[output.html.playground]
editable = false

